<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>33 Dogs of Joy</title>
<style>
/* --- RESET & BASE --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, #fdf6e3 0%, #fce4d6 40%, #fdf6e3 100%);
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
  color: #5a3e2b;
}

/* --- HEADER --- */
.header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.header h1 {
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 800;
  color: #d4764e;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
  letter-spacing: -0.5px;
}
.header p {
  font-size: 1.1rem;
  color: #a0785c;
  margin-top: 0.4rem;
}

/* --- GRID --- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1.2rem;
  max-width: 1100px;
  margin: 0 auto;
}

/* --- CARD --- */
.card {
  perspective: 800px;
  aspect-ratio: 3 / 4;
  cursor: pointer;
  position: relative;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
  border-radius: 18px;
}
.card.revealed .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 18px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Front */
.card-front {
  background: linear-gradient(160deg, #ffe8d6, #fdd5b1);
  border: 3px solid #f0c4a0;
  box-shadow: 0 4px 16px rgba(180,120,60,0.15), inset 0 0 30px rgba(255,255,255,0.4);
  transition: box-shadow 0.25s, transform 0.25s;
}
.card:hover .card-front {
  box-shadow: 0 8px 24px rgba(180,120,60,0.25), inset 0 0 30px rgba(255,255,255,0.4);
  transform: scale(1.03);
}
.card.revealed:hover .card-front { transform: none; }

.paw {
  font-size: 3rem;
  margin-bottom: 0.5rem;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.1));
  transition: transform 0.3s;
}
.card:hover .paw { transform: rotate(-12deg) scale(1.1); }

.card-number {
  font-size: 1.6rem;
  font-weight: 800;
  color: #c0653e;
}
.tap-hint {
  font-size: 0.75rem;
  color: #c4976e;
  margin-top: 0.6rem;
  opacity: 0;
  transition: opacity 0.3s;
}
.card:hover .tap-hint { opacity: 1; }

/* Back */
.card-back {
  background: #fff;
  border: 3px solid #f0c4a0;
  transform: rotateY(180deg);
  padding: 0;
  justify-content: flex-start;
}
.card-back img {
  width: 100%;
  height: 75%;
  object-fit: cover;
  border-radius: 15px 15px 0 0;
}
.card-back .caption {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.4rem 0.6rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: #7a4f34;
  text-align: center;
  line-height: 1.3;
}

/* --- CONFETTI CANVAS --- */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1000;
}

/* --- PROGRESS --- */
.progress-bar {
  max-width: 400px;
  margin: 0 auto 2rem;
  text-align: center;
}
.progress-bar .track {
  height: 10px;
  background: #f0d9c4;
  border-radius: 5px;
  overflow: hidden;
  margin-top: 0.4rem;
}
.progress-bar .fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #f4a261, #e76f51);
  border-radius: 5px;
  transition: width 0.5s ease;
}
.progress-bar .label {
  font-size: 0.9rem;
  font-weight: 600;
  color: #b07a55;
}

/* --- RESPONSIVE --- */
@media (max-width: 500px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
  body { padding: 1.2rem 0.6rem 3rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>33 Pieski na 33-cie urodziny Wiktora!</h1>
  <p>Wszystkiego najlepszego!!</p>
</div>

<div class="progress-bar">
  <span class="label"><span id="count">0</span> / 33 revealed</span>
  <div class="track"><div class="fill" id="fill"></div></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div class="grid" id="grid"></div>

<script>
// ===== CONFIG =====
// Image path pattern — replace with your own.
// Expects files: dogs/1.jpg, dogs/2.jpg, ... dogs/33.jpg
const IMAGE_PATH = (n) => `dogs/${n}.jpg`;

// Captions — customise these! One per card.
const CAPTIONS = [
  /* PLACEHOLDER_CAPTIONS_START */
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  "Your caption here", "Your caption here", "Your caption here",
  /* PLACEHOLDER_CAPTIONS_END */
];

// ===== CONFETTI ENGINE =====
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animFrameId = null;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const CONFETTI_COLORS = ['#f4a261','#e76f51','#e9c46a','#2a9d8f','#ff6b6b','#a855f7','#f472b6','#fbbf24'];

function spawnConfetti(x, y) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      size: 4 + Math.random() * 5,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      life: 1,
      decay: 0.012 + Math.random() * 0.01,
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
    });
  }
  if (!animFrameId) tickConfetti();
}

function tickConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.vx *= 0.98;
    p.rotation += p.rotSpeed;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') {
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });
  if (particles.length > 0) {
    animFrameId = requestAnimationFrame(tickConfetti);
  } else {
    animFrameId = null;
  }
}

// ===== BUILD CARDS =====
const grid = document.getElementById('grid');
let revealedCount = 0;

for (let i = 1; i <= 33; i++) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <span class="paw">🐾</span>
        <span class="card-number">${i}</span>
        <span class="tap-hint">tap me!</span>
      </div>
      <div class="card-back">
        <img src="${IMAGE_PATH(i)}" alt="Dog ${i}" loading="lazy">
        <div class="caption">${CAPTIONS[i - 1] || ''}</div>
      </div>
    </div>
  `;
  card.addEventListener('click', function handler() {
    if (card.classList.contains('revealed')) return;
    card.classList.add('revealed');
    revealedCount++;
    document.getElementById('count').textContent = revealedCount;
    document.getElementById('fill').style.width = ((revealedCount / 33) * 100) + '%';
    const rect = card.getBoundingClientRect();
    spawnConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
  });
  grid.appendChild(card);
}
</script>
</body>
</html>
