<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wszystkiego najlepszego Wiktorze!!!</title>
<style>
/* --- RESET & BASE --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, #fdf6e3 0%, #fce4d6 40%, #fdf6e3 100%);
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
  color: #5a3e2b;
}

/* --- HEADER --- */
.header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.header h1 {
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 800;
  color: #d4764e;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
  letter-spacing: -0.5px;
}
.header p {
  font-size: 1.1rem;
  color: #a0785c;
  margin-top: 0.4rem;
}

/* --- GRID --- */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1.2rem;
  max-width: 1100px;
  margin: 0 auto;
}

/* --- CARD --- */
.card {
  perspective: 800px;
  aspect-ratio: 3 / 4;
  cursor: pointer;
  position: relative;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
  border-radius: 18px;
}
.card.revealed .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 18px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Front */
.card-front {
  background: linear-gradient(160deg, #ffe8d6, #fdd5b1);
  border: 3px solid #f0c4a0;
  box-shadow: 0 4px 16px rgba(180,120,60,0.15), inset 0 0 30px rgba(255,255,255,0.4);
  transition: box-shadow 0.25s, transform 0.25s;
}
.card:hover .card-front {
  box-shadow: 0 8px 24px rgba(180,120,60,0.25), inset 0 0 30px rgba(255,255,255,0.4);
  transform: scale(1.03);
}
.card.revealed:hover .card-front { transform: none; }

.paw {
  font-size: 3rem;
  margin-bottom: 0.5rem;
  filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.1));
  transition: transform 0.3s;
}
.card:hover .paw { transform: rotate(-12deg) scale(1.1); }

.card-number {
  font-size: 1.6rem;
  font-weight: 800;
  color: #c0653e;
}
.tap-hint {
  font-size: 0.75rem;
  color: #c4976e;
  margin-top: 0.6rem;
  opacity: 0;
  transition: opacity 0.3s;
}
.card:hover .tap-hint { opacity: 1; }

/* Back */
.card-back {
  background: #fff;
  border: 3px solid #f0c4a0;
  transform: rotateY(180deg);
  padding: 0;
  justify-content: flex-start;
}
.card-back img {
  width: 100%;
  height: 75%;
  object-fit: cover;
  border-radius: 15px 15px 0 0;
}
.card-back .caption {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.4rem 0.6rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: #7a4f34;
  text-align: center;
  line-height: 1.3;
}

/* --- CONFETTI CANVAS --- */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1000;
}

/* --- PROGRESS --- */
.progress-bar {
  max-width: 400px;
  margin: 0 auto 2rem;
  text-align: center;
}
.progress-bar .track {
  height: 10px;
  background: #f0d9c4;
  border-radius: 5px;
  overflow: hidden;
  margin-top: 0.4rem;
}
.progress-bar .fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #f4a261, #e76f51);
  border-radius: 5px;
  transition: width 0.5s ease;
}
.progress-bar .label {
  font-size: 0.9rem;
  font-weight: 600;
  color: #b07a55;
}

/* --- LIGHTBOX --- */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
  cursor: zoom-out;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
.lightbox.active {
  opacity: 1;
  visibility: visible;
}
.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  transform-origin: 0 0;
  cursor: grab;
  transition: none;
}
.lightbox img.grabbing { cursor: grabbing; }
.lightbox-close {
  position: absolute;
  top: 1rem;
  right: 1.2rem;
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  font-size: 2rem;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  line-height: 1;
}
.lightbox-close:hover { background: rgba(255,255,255,0.3); }
.lightbox-hint {
  position: absolute;
  bottom: 1.2rem;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
  pointer-events: none;
}

/* --- RESPONSIVE --- */
@media (max-width: 500px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
  body { padding: 1.2rem 0.6rem 3rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>33 pieski na 33-cie urodziny Wiktora!</h1>
  <p>Wszystkiego najlepszego!</p>
</div>

<div class="progress-bar">
  <span class="label"><span id="count">0</span> / 33 revealed</span>
  <div class="track"><div class="fill" id="fill"></div></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lb-close" aria-label="Close">&times;</button>
  <img id="lb-img" src="" alt="Full size dog">
  <span class="lightbox-hint">Scroll to zoom &middot; Drag to pan &middot; Click background to close</span>
</div>

<div class="grid" id="grid"></div>

<script>
// ===== CONFIG =====
// Image path pattern — replace with your own.
// Expects files: dogs/1.jpg, dogs/2.jpg, ... dogs/33.jpg
const IMAGE_PATH = (n) => `dogs/${n}.jpg`;

// Captions — customise these! One per card.
const CAPTIONS = [
  /* PLACEHOLDER_CAPTIONS_START */
  "Lola - już po drugiej stronie tęczowego mostu!", "Ziaja. Buszująca w trawie, moje ulubione zdjęcie", "Wedel, skąpany w promieniach słońca",
  "Ziaja z piłką, która jeszcze nie wpadła pod szafę", "Wedel, każdy pies ma swojego psa", "Ziaja wybiegana",
  "Wedel i Arbuz Artek", "Ziaja. Rzucenie piłki nie daje gwarancji otrzymania jej z powrotem", "Wedel jesienny, pierwszośniegowy",
  "Ziaja. Będzie bardzo zła, jak zabierzesz jej pastę.", "Wedel, Pierwszy raz u mnie!", "Ziaja i jej ulubiona rybka. Kiedyś w środku była piszczałka, ale już jej nie ma. Nie pytaj.",
  "Wedel. Łóżko Ziajki, ale ten też się zmieści.", "Ziajka, wsiowy burek!", "Wedel, Ziaja gościnnie wcina piłkę, chyba się nudzi.",
  "Ziaja znalazła piłkę w trawie i teraz jest nasza, czyli głównie Wedla", "Wedel. Okaz zmęczony tarmoszeniem świni.", "Ziaja oraz Tajemnia Zagubionego Frisbee",
  "Wedel, wlazł na łóżko i nie zamierza schodzić", "Ziaja kampania zimowa", "Wedel próbuje rybkę zabrać, ale Ziaja dzielnie walczy",
  "Ziaja, rasowy pies wystawowy", "Wedel i Ziaja, po śniadanku", "Ziaja kampania zimowa część druga, zemsta patyka",
  "Ziaja polująca na wiewiórkę", "Ziaja wyraża niezadowolenie z powodu utraty brzuchogłasków", "Ziaja wybiegana",
  "Ziaja oczekująca", "Ziaja, tak patrzy się na mnie spacer", "Ziaja śpiąca królewna",
  "Patyk. Ziaja w tle", "POV: Ziaja i Wedel gdy masz smaczka", "No i na koniec: Ziaja i Lola.",
  /* PLACEHOLDER_CAPTIONS_END */
];

// ===== CONFETTI ENGINE =====
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animFrameId = null;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const CONFETTI_COLORS = ['#f4a261','#e76f51','#e9c46a','#2a9d8f','#ff6b6b','#a855f7','#f472b6','#fbbf24'];

function spawnConfetti(x, y) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      size: 4 + Math.random() * 5,
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      life: 1,
      decay: 0.012 + Math.random() * 0.01,
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
    });
  }
  if (!animFrameId) tickConfetti();
}

function tickConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.vx *= 0.98;
    p.rotation += p.rotSpeed;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rotation * Math.PI) / 180);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') {
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });
  if (particles.length > 0) {
    animFrameId = requestAnimationFrame(tickConfetti);
  } else {
    animFrameId = null;
  }
}

// ===== LIGHTBOX =====
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbClose = document.getElementById('lb-close');

let lbScale = 1, lbX = 0, lbY = 0;
let isDragging = false, dragStartX = 0, dragStartY = 0, startLbX = 0, startLbY = 0;

function openLightbox(src) {
  lbImg.src = src;
  lbScale = 1; lbX = 0; lbY = 0;
  applyTransform();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
}

function applyTransform() {
  // Center the image, then apply pan + zoom
  lbImg.style.transform = `translate(calc(-50% + ${lbX}px), calc(-50% + ${lbY}px)) scale(${lbScale})`;
  lbImg.style.transformOrigin = 'center center';
  lbImg.style.position = 'absolute';
  lbImg.style.left = '50%';
  lbImg.style.top = '50%';
}

lbClose.addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

// Zoom with scroll wheel
lightbox.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.12 : 0.12;
  lbScale = Math.min(Math.max(0.5, lbScale + delta * lbScale), 8);
  applyTransform();
}, { passive: false });

// Drag to pan
lbImg.addEventListener('mousedown', (e) => {
  e.preventDefault();
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  startLbX = lbX; startLbY = lbY;
  lbImg.classList.add('grabbing');
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  lbX = startLbX + (e.clientX - dragStartX);
  lbY = startLbY + (e.clientY - dragStartY);
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  lbImg.classList.remove('grabbing');
});

// Touch support: pinch-to-zoom + drag
let lastTouchDist = 0;
lightbox.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    startLbX = lbX; startLbY = lbY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    lastTouchDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
  }
}, { passive: true });
lightbox.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    lbX = startLbX + (e.touches[0].clientX - dragStartX);
    lbY = startLbY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    lbScale = Math.min(Math.max(0.5, lbScale * (dist / lastTouchDist)), 8);
    lastTouchDist = dist;
    applyTransform();
  }
}, { passive: false });
lightbox.addEventListener('touchend', () => { isDragging = false; });

// ===== BUILD CARDS =====
const grid = document.getElementById('grid');
let revealedCount = 0;

for (let i = 1; i <= 33; i++) {
  const card = document.createElement('div');
  card.className = 'card';
  const imgSrc = IMAGE_PATH(i);
  card.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <span class="paw">🐾</span>
        <span class="card-number">${i}</span>
        <span class="tap-hint">tap me!</span>
      </div>
      <div class="card-back">
        <img src="${imgSrc}" alt="Dog ${i}" loading="lazy">
        <div class="caption">${CAPTIONS[i - 1] || ''}</div>
      </div>
    </div>
  `;
  card.addEventListener('click', function () {
    if (!card.classList.contains('revealed')) {
      // First click: reveal
      card.classList.add('revealed');
      revealedCount++;
      document.getElementById('count').textContent = revealedCount;
      document.getElementById('fill').style.width = ((revealedCount / 33) * 100) + '%';
      const rect = card.getBoundingClientRect();
      spawnConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
    } else {
      // Second click: open lightbox
      openLightbox(imgSrc);
    }
  });
  grid.appendChild(card);
}
</script>
</body>
</html>
